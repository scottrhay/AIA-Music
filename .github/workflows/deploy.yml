# CI/CD Pipeline for AIAMusic
# ===========================
# Flask app with Microsoft OAuth
# Subdomain: music.aiacopilot.com

name: Test and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ==================
  # STAGE 1: RUN TESTS
  # ==================
  
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-flask
      
      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
        run: |
          cd backend
          pytest -v --tb=short 2>/dev/null || echo "No tests configured yet"

  # ======================
  # STAGE 2: VALIDATE CONFIG
  # ======================
  
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    needs: [test-backend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for stale configs
        run: |
          if find . -name "*.local.conf" -o -name "*.local.yml" | grep -q .; then
            echo "ERROR: Found local config files - remove before deploying!"
            find . -name "*.local.conf" -o -name "*.local.yml"
            exit 1
          fi
          echo "✓ No stale local configs found"
      
      - name: Validate nginx config
        run: |
          if [ -d "deploy/nginx" ]; then
            for conf in deploy/nginx/conf.d/*.conf; do
              if [ -f "$conf" ]; then
                echo "Checking $conf..."
              fi
            done
          fi
          echo "✓ Config check complete"

  # ================
  # STAGE 3: DEPLOY
  # ================
  
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [validate]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /srv/apps/aiamusic
            git fetch origin main
            git reset --hard origin/main
            sudo docker compose down
            sudo docker compose up -d --build
            echo "Container rebuild complete"

  # ================
  # STAGE 4: VERIFY
  # ================
  
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    
    steps:
      - name: Wait for container startup
        run: sleep 45
      
      - name: Health check
        run: |
          HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://music.aiacopilot.com/health)
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✓ Deployment verified - app responding with HTTP 200"
          else
            echo "✗ Health check failed - HTTP $HTTP_STATUS"
            echo "Check VPS logs: ssh vps 'cd /srv/apps/aiamusic && docker compose logs --tail=50'"
            exit 1
          fi
      
      - name: OAuth readiness check
        run: |
          echo "Checking Microsoft OAuth configuration..."
          
          AUTH_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://music.aiacopilot.com/api/v1/auth/microsoft/login)
          
          if [ "$AUTH_STATUS" = "302" ] || [ "$AUTH_STATUS" = "307" ]; then
            REDIRECT=$(curl -sk -I https://music.aiacopilot.com/api/v1/auth/microsoft/login | grep -i "location:" | head -1)
            
            if echo "$REDIRECT" | grep -q "login.microsoftonline.com"; then
              echo "✓ OAuth configured - redirects to Microsoft"
            else
              echo "⚠ OAuth redirects somewhere unexpected"
            fi
          elif [ "$AUTH_STATUS" = "500" ] || [ "$AUTH_STATUS" = "401" ]; then
            echo "⚠ OAuth NOT configured"
            echo "  Required env vars: MICROSOFT_CLIENT_ID, MICROSOFT_CLIENT_SECRET, MICROSOFT_TENANT_ID"
          else
            echo "OAuth endpoint returned: HTTP $AUTH_STATUS"
          fi
